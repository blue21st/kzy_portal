<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>kzy ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1b2d;color:#f8faff;font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:82px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#243b5a;border-radius:2px}
header{background:linear-gradient(135deg,#0f1b2d,#1a2e4a);border-bottom:2.5px solid #f5c842;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.5)}
.header-inner{padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.04em}
.logo span{color:#f5c842}
.admin-btn{background:rgba(255,255,255,.1);border:none;color:#8fa3bc;font-family:inherit;font-size:12px;font-weight:700;padding:7px 12px;border-radius:10px;cursor:pointer}
.admin-btn.active{background:rgba(232,64,64,.2);color:#ff7a7a}
.admin-bar{background:rgba(245,200,66,.12);border-top:1px solid rgba(245,200,66,.2);padding:5px 16px;font-size:11px;color:#f5c842;font-weight:700;display:none}
.admin-bar.show{display:block}
.notice{margin:12px 14px 0;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.22);border-radius:12px;padding:10px 12px;font-size:11px;line-height:1.6;color:#bdd8ff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:12px 14px 0}
.stat{background:#1a2e4a;border-radius:11px;padding:10px 5px;text-align:center;border:1px solid rgba(74,158,255,.12)}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#f5c842;line-height:1}
.stat-l{font-size:9px;color:#8fa3bc;margin-top:3px}
.content{padding:12px 14px 0}
.tab-panel{display:none}.tab-panel.active{display:block}
.sec-title{font-size:14px;font-weight:700;color:#8fa3bc;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card{background:#1a2e4a;border-radius:14px;border:1px solid rgba(74,158,255,.13);overflow:hidden;margin-bottom:10px}
.card.today{border:1.5px solid #f5c842}
.today-bar{background:#f5c842;padding:3px 14px;font-size:11px;font-weight:800;color:#0f1b2d}
.card-body{padding:14px}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-blue{background:rgba(74,158,255,.2);color:#7ab8ff}
.pill-purple{background:rgba(192,132,252,.18);color:#d2a2ff}
.pill-green{background:rgba(45,160,80,.22);color:#82e6a0}
.pill-orange{background:rgba(245,158,11,.2);color:#fbbf24}
.pill-red{background:rgba(239,68,68,.17);color:#fca5a5}
.pill-gray{background:rgba(255,255,255,.08);color:#b5c4d8}
.pill-gold{background:rgba(245,200,66,.18);color:#f5c842}
.sched-row{display:flex;justify-content:space-between;align-items:flex-start}
.sched-date{text-align:center;background:rgba(255,255,255,.06);border-radius:9px;padding:5px 9px;min-width:52px;flex-shrink:0}
.sched-date .d{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1}
.sched-date .w{font-size:10px;color:#8fa3bc}
.sched-info{flex:1;padding:0 10px}
.sched-name{font-size:14px;font-weight:700;line-height:1.3}
.sched-venue{font-size:11px;color:#8fa3bc;margin-top:3px}
.tour-name{font-size:16px;font-weight:800;margin-bottom:8px}
.tour-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tour-meta{font-size:12px;color:#c8d5e6;margin-top:6px;display:flex;gap:7px;align-items:flex-start;line-height:1.5}
.tour-meta-label{color:#8fa3bc;min-width:56px}
.tour-status-box{margin-top:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:10px 12px}
.tour-status-title{font-size:11px;font-weight:700;color:#8fa3bc;margin-bottom:5px}
.tour-footer{padding:0 14px 14px;display:flex;gap:8px}
.btn{border:none;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:10px 16px;font-size:13px}
.btn-outline{background:transparent;border:1.5px solid #4a9eff;color:#4a9eff}
.btn-ghost{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3);color:#7ab8ff;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:10px;font-size:13px;width:100%}
.btn-primary{background:#f5c842;color:#0f1b2d}
.btn-sm{padding:7px 12px;font-size:12px}
.empty{text-align:center;padding:40px 0;color:#8fa3bc;font-size:14px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-scores{display:flex;align-items:center;justify-content:space-around}
.result-team{text-align:center;flex:1}
.result-team-name{font-size:12px;font-weight:700;margin-bottom:3px}
.result-score{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;line-height:1}
.result-sep{font-size:18px;color:rgba(255,255,255,.2);font-weight:700;padding:0 4px;margin-top:16px}
.result-label{text-align:center;margin-top:8px;font-size:11px;font-weight:700}
nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,20,35,.97);border-top:1px solid rgba(74,158,255,.18);backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:6px 0 10px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#8fa3bc;cursor:pointer;padding:4px 28px;font-family:inherit;min-width:72px;position:relative}
.nav-btn.active{color:#f5c842}
.nav-btn.active::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:#f5c842;border-radius:0 0 4px 4px}
.nav-icon{font-size:22px}
.nav-label{font-size:11px;font-weight:500}
.nav-btn.active .nav-label{font-weight:700}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet-overlay.open{display:flex}
.sheet{background:#152438;border-radius:20px 20px 0 0;border:1px solid rgba(74,158,255,.25);width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0}
.sheet-header{padding:13px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#152438}
.sheet-title{font-size:16px;font-weight:700}
.sheet-close{background:rgba(255,255,255,.1);border:none;color:#f8faff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:14px 18px 32px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#8fa3bc;margin-bottom:4px;font-weight:600}
.field input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:10px 13px;color:#f8faff;font-size:14px;outline:none;font-family:inherit}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-full{width:100%}
.detail-block{margin-bottom:18px}
.detail-title{font-size:12px;font-weight:700;color:#f5c842;margin-bottom:8px}
.detail-text{font-size:13px;line-height:1.7;color:#e7eef8}
.detail-list{display:flex;flex-direction:column;gap:8px}
.detail-item{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.6}
.detail-item strong{color:#f8faff}
.team-list{display:flex;flex-direction:column;gap:7px}
.team-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:10px;padding:9px 12px}
.team-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#8fa3bc;min-width:18px}
.loading{padding:28px 0;text-align:center;color:#8fa3bc}
.error-box{margin:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:12px 14px;color:#fecaca;font-size:12px;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">⚾ kzy <span>ポータル</span></div>
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理者</button>
  </div>
  <div class="admin-bar" id="adminBar">✏️ 管理者モード（※無料の静的サイトなので簡易パスワードです）</div>
</header>

<div class="notice">
  データは <strong>db.json</strong> から読み込みます。大会情報は GitHub の JSON を更新すれば反映できます。
</div>

<div id="errorBox"></div>
<div class="stats" id="statsBar"></div>

<div class="content">
  <div class="tab-panel active" id="panel-schedule"></div>
  <div class="tab-panel" id="panel-tournaments"></div>
  <div class="tab-panel" id="panel-results"></div>
</div>

<nav>
  <button class="nav-btn active" onclick="switchTab('schedule',this)"><span class="nav-icon">📅</span><span class="nav-label">日程</span></button>
  <button class="nav-btn" onclick="switchTab('tournaments',this)"><span class="nav-icon">🏆</span><span class="nav-label">大会</span></button>
  <button class="nav-btn" onclick="switchTab('results',this)"><span class="nav-icon">📊</span><span class="nav-label">結果</span></button>
</nav>

<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle"></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<script>
const FALLBACK_DB = {
  schedules: [
    {id:1,date:"2026-03-29",weekday:"土",tag:"ふれあい大会",name:"vs 小寺少年団野球部",type:"league",venue:"小束山小学校（14:00〜）",status:"today"}
  ],
  tournaments: [
    {
      id:1,
      name:"ふれあい大会",
      type:"league",
      format:"リーグ戦",
      period:"3月〜",
      status:"ongoing",
      hostType:"boysclub",
      organizer:"少年団野球リーグ（神戸市全体）",
      currentStatus:"第3節終了 / kzy 2位",
      teamList:["kzy","小寺少年団野球部","北須磨ファイターズ","多聞台少年野球","西神戸ドラゴンズ","白川ホークス","星陵台クラブ","西舞子ジュニア"],
      rules:["6回制・80分","タイブレークあり","投球数制限あり"]
    },
    {
      id:2,
      name:"親善大会",
      type:"tournament",
      format:"トーナメント戦",
      period:"9月〜",
      status:"before",
      hostType:"boysclub",
      organizer:"少年団野球リーグ（垂水地区）",
      currentStatus:"組み合わせ発表待ち",
      teamList:[],
      rules:["大会要項確定前"]
    },
    {
      id:3,
      name:"ナゲセケンコー杯",
      type:"tournament",
      format:"トーナメント戦",
      period:"3月〜",
      status:"before",
      hostType:"other",
      organizer:"KSBL",
      currentStatus:"参加受付中",
      teamList:["kzy","Aチーム","Bチーム","Cチーム"],
      rules:["トーナメント制","球数制限あり"]
    },
    {
      id:4,
      name:"前期Jr.リーグ",
      type:"league",
      format:"リーグ戦",
      period:"3月〜",
      status:"ongoing",
      hostType:"other",
      organizer:"北神戸少年野球連盟",
      currentStatus:"2試合消化 / 暫定3位",
      teamList:["kzy Jr.","Dチーム","Eチーム","Fチーム"],
      rules:["5回制","勝点制"]
    },
    {
      id:5,
      name:"西区ジュニアリーグ",
      type:"league",
      format:"リーグ戦",
      period:"",
      status:"before",
      hostType:"other",
      organizer:"",
      currentStatus:"情報登録前",
      teamList:[],
      rules:[]
    },
    {
      id:6,
      name:"ジュニア大会",
      type:"tournament",
      format:"トーナメント戦",
      period:"10月〜",
      status:"finished",
      hostType:"boysclub",
      organizer:"少年団野球リーグ（垂水地区）",
      currentStatus:"大会終了 / ベスト4",
      teamList:["kzy Jr.","Gチーム","Hチーム","Iチーム"],
      rules:["トーナメント戦","5回制"]
    }
  ],
  results: []
};

let DB = JSON.parse(JSON.stringify(FALLBACK_DB));
let isAdmin = false;

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function switchTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

function statusMeta(status){
  if(status === 'ongoing') return {label:'開催中', cls:'pill-green'};
  if(status === 'finished') return {label:'終了', cls:'pill-gray'};
  return {label:'開催前', cls:'pill-orange'};
}

function hostMeta(hostType){
  if(hostType === 'boysclub') return {label:'少年団主催', cls:'pill-blue'};
  return {label:'他団体主催', cls:'pill-purple'};
}

function typeMeta(type){
  if(type === 'league') return {label:'リーグ戦', cls:'pill-blue'};
  if(type === 'practice') return {label:'練習試合', cls:'pill-gray'};
  return {label:'トーナメント戦', cls:'pill-gold'};
}

function renderStats(){
  const ongoing = DB.tournaments.filter(t=>t.status==='ongoing').length;
  const upcoming = DB.schedules.filter(s=>s.status==='upcoming' || s.status==='today').length;
  const wins = DB.results.filter(r=>r.homeScore > r.awayScore).length;
  const stats = [
    {n:DB.tournaments.length,l:'大会数'},
    {n:upcoming,l:'予定試合'},
    {n:wins,l:'勝利数'},
    {n:ongoing,l:'開催中'}
  ];
  document.getElementById('statsBar').innerHTML = stats.map(s =>
    `<div class="stat"><div class="stat-n">${s.n}</div><div class="stat-l">${esc(s.l)}</div></div>`
  ).join('');
}

function renderSchedule(){
  let html = '<div class="sec-title"><span>試合日程</span></div>';
  if(!DB.schedules.length){
    html += '<div class="empty">⚾ スケジュールがありません</div>';
  }
  DB.schedules.forEach(s=>{
    const dateStr = s.date ? s.date.slice(5).replace('-','/') : '';
    const meta = typeMeta(s.type);
    html += `
      <div class="card ${s.status==='today' ? 'today' : ''}">
        ${s.status==='today' ? '<div class="today-bar">📣 本日開催</div>' : ''}
        <div class="card-body">
          <div class="sched-row">
            <div class="sched-date">
              <div class="d" style="color:${s.status==='today' ? '#f5c842' : '#f8faff'}">${esc(dateStr)}</div>
              <div class="w">${esc(s.weekday)}曜</div>
            </div>
            <div class="sched-info">
              ${s.tag ? `<div style="margin-bottom:4px"><span class="pill pill-blue">${esc(s.tag)}</span></div>` : ''}
              <div class="sched-name">${esc(s.name)}</div>
              <div class="sched-venue">📍 ${esc(s.venue)}</div>
            </div>
            <span class="pill ${meta.cls}">${meta.label}</span>
          </div>
        </div>
      </div>
    `;
  });
  document.getElementById('panel-schedule').innerHTML = html;
}

function renderTournaments(){
  let html = '<div class="sec-title"><span>大会一覧</span></div>';
  if(!DB.tournaments.length){
    html += '<div class="empty">大会がありません</div>';
  }
  DB.tournaments.forEach(t=>{
    const sm = statusMeta(t.status);
    const hm = hostMeta(t.hostType);
    const tm = typeMeta(t.type);
    const ruleCount = Array.isArray(t.rules) ? t.rules.length : 0;
    const teamCount = Array.isArray(t.teamList) ? t.teamList.length : 0;
    html += `
      <div class="card">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px">
            <div class="tour-name" style="margin-bottom:0">${esc(t.name)}</div>
            <span class="pill ${sm.cls}">${sm.label}</span>
          </div>
          <div class="tour-pills">
            <span class="pill ${hm.cls}">${hm.label}</span>
          </div>
          ${t.period ? `<div class="tour-meta"><span class="tour-meta-label">開催期間</span><span>${esc(t.period)}</span></div>` : ''}
          <div class="tour-meta"><span class="tour-meta-label">試合形式</span><span>${tm.label}</span></div>
          <div class="tour-meta"><span class="tour-meta-label">参加チーム</span><span>${teamCount}チーム</span></div>
          <div class="tour-meta"><span class="tour-meta-label">ルール</span><span>${ruleCount ? `${ruleCount}件登録` : '未登録'}</span></div>
          <div class="tour-meta"><span class="tour-meta-label">主催</span><span>${t.organizer ? esc(t.organizer) : '未登録'}</span></div>
          <div class="tour-status-box">
            <div class="tour-status-title">現在の状況</div>
            <div style="font-size:13px;line-height:1.6">${t.currentStatus ? esc(t.currentStatus) : '未登録'}</div>
          </div>
        </div>
        <div class="tour-footer">
          <button class="btn-ghost" onclick="openDetail(${t.id})">詳細を見る →</button>
        </div>
      </div>
    `;
  });
  document.getElementById('panel-tournaments').innerHTML = html;
}

function renderResults(){
  let html = '<div class="sec-title"><span>試合結果</span></div>';
  if(!DB.results.length){
    html += '<div class="empty">⚾ 試合結果がありません</div>';
  }
  DB.results.forEach(r=>{
    const meta = typeMeta(r.type);
    const dateStr = r.date ? r.date.slice(5).replace('-','/') : '';
    const win = r.homeScore > r.awayScore;
    html += `
      <div class="card">
        <div class="card-body">
          <div class="result-header">
            <span style="font-size:11px;color:#8fa3bc">${esc(dateStr)} · ${esc(r.tournamentName || '')}</span>
            <span class="pill ${meta.cls}">${meta.label}</span>
          </div>
          <div class="result-scores">
            <div class="result-team">
              <div class="result-team-name">${esc(r.home)}</div>
              <div class="result-score" style="color:${win ? '#f5c842' : '#8fa3bc'}">${Number(r.homeScore || 0)}</div>
            </div>
            <div class="result-sep">–</div>
            <div class="result-team">
              <div class="result-team-name">${esc(r.away)}</div>
              <div class="result-score" style="color:${!win ? '#f5c842' : '#8fa3bc'}">${Number(r.awayScore || 0)}</div>
            </div>
          </div>
          ${win ? '<div class="result-label" style="color:#f5c842">🏆 勝利</div>' : (Number(r.homeScore) < Number(r.awayScore) ? '<div class="result-label" style="color:#8fa3bc">惜敗</div>' : '')}
        </div>
      </div>
    `;
  });
  document.getElementById('panel-results').innerHTML = html;
}

function openDetail(id){
  const t = DB.tournaments.find(x=>x.id===id);
  if(!t) return;
  const sm = statusMeta(t.status);
  const hm = hostMeta(t.hostType);
  const tm = typeMeta(t.type);
  const teams = (t.teamList && t.teamList.length)
    ? `<div class="team-list">${t.teamList.map((name,i)=>`<div class="team-row"><span class="team-num">${i+1}</span><span>${esc(name)}</span></div>`).join('')}</div>`
    : '<div class="detail-item">参加チーム未登録</div>';
  const rules = (t.rules && t.rules.length)
    ? `<div class="detail-list">${t.rules.map(rule=>`<div class="detail-item">${esc(rule)}</div>`).join('')}</div>`
    : '<div class="detail-item">ルール未登録</div>';

  openSheet(t.name, `
    <div class="detail-block">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:18px;font-weight:800">${esc(t.name)}</div>
        <span class="pill ${sm.cls}">${sm.label}</span>
      </div>
      <div class="tour-pills">
        <span class="pill ${hm.cls}">${hm.label}</span>
      </div>
      <div class="detail-item"><strong>試合形式：</strong>${tm.label}</div>
    </div>
    <div class="detail-block">
      <div class="detail-title">現在の状況</div>
      <div class="detail-item">${t.currentStatus ? esc(t.currentStatus) : '未登録'}</div>
    </div>
    <div class="detail-block">
      <div class="detail-title">主催情報</div>
      <div class="detail-item"><strong>主催区分：</strong>${hm.label}<br><strong>主催団体：</strong>${t.organizer ? esc(t.organizer) : '未登録'}<br><strong>開催期間：</strong>${t.period ? esc(t.period) : '未登録'}</div>
    </div>
    <div class="detail-block">
      <div class="detail-title">参加チーム</div>
      ${teams}
    </div>
    <div class="detail-block">
      <div class="detail-title">ルール</div>
      ${rules}
    </div>
  `);
}

function openSheet(title, html){
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(e){
  if(e && e.target !== document.getElementById('sheet')) return;
  document.getElementById('sheet').classList.remove('open');
}

function toggleAdmin(){
  if(isAdmin){
    isAdmin = false;
    document.getElementById('adminBtn').textContent = '🔒 管理者';
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminBar').classList.remove('show');
    return;
  }
  openSheet('管理者ログイン', `
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="loginPw" placeholder="••••••••">
    </div>
    <div id="loginErr" style="color:#fca5a5;font-size:12px;margin-bottom:8px;display:none">パスワードが違います</div>
    <div style="font-size:11px;color:#8fa3bc;margin-bottom:14px">簡易パスワード例: baseball2025</div>
    <div class="btn-row">
      <button class="btn btn-outline btn-full" onclick="closeSheet()">キャンセル</button>
      <button class="btn btn-primary btn-full" onclick="tryLogin()">ログイン</button>
    </div>
  `);
}

function tryLogin(){
  const pw = document.getElementById('loginPw').value;
  if(pw === 'baseball2025'){
    isAdmin = true;
    document.getElementById('adminBtn').textContent = '🔓 管理中';
    document.getElementById('adminBtn').classList.add('active');
    document.getElementById('adminBar').classList.add('show');
    closeSheet();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showError(message){
  const box = document.getElementById('errorBox');
  if(!message){
    box.innerHTML = '';
    return;
  }
  box.innerHTML = `<div class="error-box">${message}</div>`;
}

async function loadDb(){
  try{
    const res = await fetch('./db.json?ts=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('db.json の取得に失敗しました');
    const json = await res.json();
    DB = {
      schedules: Array.isArray(json.schedules) ? json.schedules : [],
      tournaments: Array.isArray(json.tournaments) ? json.tournaments : [],
      results: Array.isArray(json.results) ? json.results : []
    };
    showError('');
  }catch(err){
    DB = JSON.parse(JSON.stringify(FALLBACK_DB));
    showError('db.json を読み込めなかったため、HTML内のサンプルデータを表示しています。GitHub で公開するときは db.json を同じ階層に置いてください。');
  }
}

function renderAll(){
  renderStats();
  renderSchedule();
  renderTournaments();
  renderResults();
}

(async function init(){
  document.getElementById('panel-schedule').innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('panel-tournaments').innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('panel-results').innerHTML = '<div class="loading">読み込み中…</div>';
  await loadDb();
  renderAll();
})();
</script>
</body>
</html>
