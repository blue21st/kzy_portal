<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>kzy ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1b2d;color:#f8faff;font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:80px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#243b5a;border-radius:2px}

/* HEADER */
header{background:linear-gradient(135deg,#0f1b2d,#1a2e4a);border-bottom:2.5px solid #f5c842;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.5)}
.header-inner{padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.04em}
.logo span{color:#f5c842}
.admin-btn{background:rgba(255,255,255,.1);border:none;color:#8fa3bc;font-family:inherit;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer}
.admin-btn.active{background:rgba(232,64,64,.2);color:#e84040}
.admin-bar{background:rgba(245,200,66,.12);border-top:1px solid rgba(245,200,66,.2);padding:4px 16px;font-size:11px;color:#f5c842;font-weight:700;display:none}
.admin-bar.show{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:12px 14px 0}
.stat{background:#1a2e4a;border-radius:11px;padding:9px 5px;text-align:center;border:1px solid rgba(74,158,255,.12)}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#f5c842;line-height:1}
.stat-l{font-size:9px;color:#8fa3bc;margin-top:3px}

/* CONTENT */
.content{padding:12px 14px 0}
.tab-panel{display:none}.tab-panel.active{display:block}

/* SECTION TITLE */
.sec-title{font-size:14px;font-weight:700;color:#8fa3bc;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

/* CARDS */
.card{background:#1a2e4a;border-radius:14px;border:1px solid rgba(74,158,255,.13);overflow:hidden;margin-bottom:10px}
.card.today{border:1.5px solid #f5c842}
.today-bar{background:#f5c842;padding:3px 14px;font-size:11px;font-weight:800;color:#0f1b2d}
.card-body{padding:13px 14px}

/* PILLS */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-gold{background:rgba(245,200,66,.18);color:#f5c842}
.pill-blue{background:rgba(74,158,255,.2);color:#7ab8ff}
.pill-green{background:rgba(45,160,80,.25);color:#6dda8a}
.pill-purple{background:rgba(192,132,252,.18);color:#c084fc}
.pill-gray{background:rgba(255,255,255,.08);color:#8fa3bc}

/* BUTTONS */
.btn{border:none;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:9px 16px;font-size:13px}
.btn-primary{background:#f5c842;color:#0f1b2d}
.btn-outline{background:transparent;border:1.5px solid #4a9eff;color:#4a9eff}
.btn-danger{background:#e84040;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.btn-ghost{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3);color:#7ab8ff;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:9px;font-size:13px;width:100%}

/* SCHEDULE CARD */
.sched-row{display:flex;justify-content:space-between;align-items:flex-start}
.sched-date{text-align:center;background:rgba(255,255,255,.06);border-radius:9px;padding:5px 9px;min-width:48px;flex-shrink:0}
.sched-date .d{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1}
.sched-date .w{font-size:10px;color:#8fa3bc}
.sched-info{flex:1;padding:0 10px}
.sched-name{font-size:14px;font-weight:700;line-height:1.3}
.sched-venue{font-size:11px;color:#8fa3bc;margin-top:3px}
.admin-actions{display:none;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.admin-actions.show{display:flex}

/* TOURNAMENT CARD */
.tour-name{font-size:15px;font-weight:800;margin-bottom:5px}
.tour-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tour-meta{font-size:12px;color:#8fa3bc;margin-top:4px;display:flex;gap:6px;align-items:flex-start}
.tour-footer{padding:0 14px 13px;display:flex;gap:7px}

/* RESULTS */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-scores{display:flex;align-items:center;justify-content:space-around}
.result-team{text-align:center;flex:1}
.result-team-name{font-size:12px;font-weight:700;margin-bottom:3px}
.result-score{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;line-height:1}
.result-sep{font-size:18px;color:rgba(255,255,255,.2);font-weight:700;padding:0 4px;margin-top:16px}
.result-label{text-align:center;margin-top:8px;font-size:11px;font-weight:700}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,20,35,.97);border-top:1px solid rgba(74,158,255,.18);backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:6px 0 10px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#8fa3bc;cursor:pointer;padding:4px 28px;font-family:inherit;min-width:72px;position:relative}
.nav-btn.active{color:#f5c842}
.nav-btn.active::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:#f5c842;border-radius:0 0 4px 4px}
.nav-icon{font-size:22px}
.nav-label{font-size:11px;font-weight:500}
.nav-btn.active .nav-label{font-weight:700}

/* SHEET (bottom modal) */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet-overlay.open{display:flex}
.sheet{background:#152438;border-radius:20px 20px 0 0;border:1px solid rgba(74,158,255,.25);width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0}
.sheet-header{padding:13px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#152438}
.sheet-title{font-size:16px;font-weight:700}
.sheet-close{background:rgba(255,255,255,.1);border:none;color:#f8faff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:14px 18px 32px}

/* FORM */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#8fa3bc;margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:10px 13px;color:#f8faff;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
.field select{background:#1a2e4a}
.field textarea{resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-row{display:flex;gap:8px;margin-top:8px}

/* INNER TABS */
.inner-tabs{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:10px;padding:3px;margin-bottom:14px}
.inner-tab{flex:1;background:transparent;border:none;color:#8fa3bc;border-radius:8px;padding:7px 3px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.inner-tab.active{background:rgba(74,158,255,.2);color:#7ab8ff}

/* STANDINGS */
.standings-table{background:rgba(0,0,0,.2);border-radius:10px;overflow:hidden}
.standings-head,.standings-row{display:grid;grid-template-columns:1.2rem 1fr repeat(4,1.8rem);gap:0 5px;padding:7px 10px;font-size:11px;align-items:center}
.standings-head{color:#8fa3bc;font-weight:700;border-bottom:1px solid rgba(255,255,255,.06)}
.standings-row{font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.standings-row:last-child{border-bottom:none}
.standings-row.top{background:rgba(245,200,66,.06)}
.standings-rank{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#8fa3bc}
.standings-row.top .standings-rank{color:#f5c842}
.standings-pts{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#f5c842}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:8px}
.bracket-inner{display:flex;gap:12px;align-items:flex-start;min-width:max-content}
.bracket-round{display:flex;flex-direction:column;align-items:center}
.bracket-round-label{font-size:9px;font-weight:700;color:#8fa3bc;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;text-align:center}
.bracket-matches{display:flex;flex-direction:column;justify-content:space-around}
.match-card{background:rgba(0,0,0,.25);border-radius:10px;overflow:hidden;border:1px solid rgba(74,158,255,.15);min-width:120px;margin-bottom:4px}
.match-slot{padding:7px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.07);cursor:default;transition:background .15s}
.match-slot:last-child{border-bottom:none}
.match-slot.winner{background:rgba(245,200,66,.15)}
.match-slot.clickable{cursor:pointer}
.slot-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.2)}
.match-slot.winner .slot-dot{background:#f5c842}
.slot-name{font-size:11px;color:rgba(248,250,255,.85);flex:1;line-height:1.3}
.match-slot.winner .slot-name{color:#f5c842;font-weight:700}
.bracket-champion{display:flex;flex-direction:column;align-items:center;padding-top:26px}
.champion-label{font-size:9px;font-weight:700;color:#8fa3bc;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.champion-box{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;min-width:100px;text-align:center}
.champion-box.crowned{background:rgba(245,200,66,.15);border-color:#f5c842}
.champion-name{font-size:11px;font-weight:700;color:#8fa3bc;margin-top:3px}
.champion-box.crowned .champion-name{color:#f5c842}

/* TEAM LIST */
.team-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:9px;padding:8px 12px;margin-bottom:6px}
.team-num{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#8fa3bc;min-width:18px}
.team-name-txt{font-size:14px;font-weight:600}
.team-remove{background:none;border:none;color:#e84040;cursor:pointer;font-size:17px;line-height:1}
.team-add-row{display:flex;gap:7px;margin-top:8px}
.team-add-row input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:8px 11px;color:#f8faff;font-size:13px;outline:none;font-family:inherit}
.team-add-btn{background:rgba(74,158,255,.2);border:1px solid rgba(74,158,255,.35);color:#7ab8ff;border-radius:10px;padding:0 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;white-space:nowrap}

/* RULES */
.rule-group{margin-bottom:18px}
.rule-group-title{font-size:11px;font-weight:700;color:#f5c842;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.rule-item{display:flex;gap:9px;margin-bottom:6px;font-size:13px;line-height:1.6;color:rgba(248,250,255,.85)}
.rule-dot{width:5px;height:5px;background:#4a9eff;border-radius:50%;margin-top:8px;flex-shrink:0}

.empty{text-align:center;padding:40px 0;color:#8fa3bc;font-size:14px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">⚾ kzy <span>ポータル</span></div>
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理者</button>
  </div>
  <div class="admin-bar" id="adminBar">✏️ 管理者モード</div>
</header>

<div class="stats" id="statsBar"></div>

<div class="content">
  <div class="tab-panel active" id="panel-schedule"></div>
  <div class="tab-panel" id="panel-tournaments"></div>
  <div class="tab-panel" id="panel-results"></div>
</div>

<nav>
  <button class="nav-btn active" onclick="switchTab('schedule',this)"><span class="nav-icon">📅</span><span class="nav-label">日程</span></button>
  <button class="nav-btn" onclick="switchTab('tournaments',this)"><span class="nav-icon">🏆</span><span class="nav-label">大会</span></button>
  <button class="nav-btn" onclick="switchTab('results',this)"><span class="nav-icon">📊</span><span class="nav-label">結果</span></button>
</nav>

<!-- SHEET -->
<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle"></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<script>
// ── DATA ──
const RULES = {
  1:[
    {g:"指導者・服装",i:["白地の襟付きシャツまたはユニフォーム","シャツはスラックスの中に入れる","ズボンは紺・黒系スラックス。ロングパンツ（裾の絞り）禁止","帽子・ストッキング・アンダーシャツ・靴下は選手と同等必須"]},
    {g:"試合",i:["6回制・80分","タイブレーク：延長1回→抽選"]},
    {g:"投手",i:["投球数：A/B 70球・C 60球","変化球禁止（再投球で投手交代）","タイム：守備・攻撃各2回（30秒以内）"]},
    {g:"用具・その他",i:["木製バット禁止","スパイク金具禁止（ゴム底のみ）","バッテリー間の守備位置交代禁止","サングラス事前申告制","集合45分前"]},
  ],
  3:[
    {g:"指導者・服装",i:["チーム統一の服装（全神戸大会は白色ポロ・Tシャツ）","ロングパンツ（裾の絞り）禁止","チーム帽子着用（救護係含む）","ネックウォーマー可（口元禁止）","サングラスは挨拶時外す"]},
    {g:"試合",i:["6回制（Jr.5回）・80分（C大会70分）","タイブレーク：1アウト満塁・監督選択打順"]},
    {g:"投手",i:["投球数：70球（4年生決勝のみ60球）","変化球禁止（宣告はボール）","練習投球：初回7球・交代5球・2回以降3球","タイム：守備・攻撃各3回（45秒以内）"]},
    {g:"用具・その他",i:["複合バット（ウレタン等）禁止","スパイク金具禁止","かくし球認めない","ベンチ内携帯禁止","集合45分前"]},
  ],
  4:[
    {g:"指導者・服装",i:["監督は背番号付きユニフォーム必須","華美でないポロ・Tシャツ、裾はズボンに","ズボンは紺・黒・灰の単色、外付けポケット禁止","代理監督：帽子に赤or黄リボン（3×10cm以内）","冬季：野球用ジャンバー可","サングラス可（投手のミラーレンズ禁止）"]},
    {g:"試合",i:["6回制（Jr.5回）・80分（Jr.70分）","タイブレーク：ノーアウト満塁・継続打者"]},
    {g:"投手",i:["投球数：70球（Jr.60球）","変化球禁止（宣告はボール）","練習投球：初回7球・次回から3球","タイム：守備・攻撃各3回（30秒目安）"]},
    {g:"用具・その他",i:["複合バット（ウレタン等）禁止","スパイク金具禁止","かくし球禁止（プレイ無効）","ベンチ内携帯：マナーモード・使用禁止","集合30分前"]},
  ],
};

let isAdmin = false;
let editingId = null;
let detailTour = null;
let detailInnerTab = 'teams';

let DB = {
  schedules: [
    {id:1,date:"2025-03-29",weekday:"土",tag:"ふれあい大会",name:"vs 小寺少年団野球部",type:"league",venue:"小束山小学校（14:00〜）",status:"today"},
  ],
  tournaments: [
    {id:1,name:"ふれあい大会",type:"league",format:"リーグ戦",period:"3月〜",prize:"主催：少年団野球リーグ（神戸市全体）",teamList:[],standings:[]},
    {id:2,name:"親善大会",type:"tournament",format:"トーナメント戦",period:"9月〜",prize:"主催：少年団野球リーグ（垂水地区）",teamList:[],bracket:null},
    {id:3,name:"ナゲセケンコー杯",type:"tournament",format:"トーナメント戦",period:"3月〜",prize:"主催：KSBL",teamList:[],bracket:null},
    {id:4,name:"前期Jr.リーグ",type:"league",format:"リーグ戦",period:"3月〜",prize:"主催：北神戸少年野球連盟",teamList:[],standings:[]},
    {id:5,name:"西区ジュニアリーグ",type:"league",format:"リーグ戦",period:"",prize:"",teamList:[],standings:[]},
    {id:6,name:"ジュニア大会",type:"tournament",format:"トーナメント戦",period:"10月〜",prize:"主催：少年団野球リーグ（垂水地区）",teamList:[],bracket:null},
  ],
  results: [],
};

// storage
function stSave() {
  try { window.storage && window.storage.set('kzy:db', JSON.stringify(DB)); } catch(e){}
}
async function stLoad() {
  try {
    if (!window.storage) return;
    const r = await Promise.race([
      window.storage.get('kzy:db'),
      new Promise(function(res){ setTimeout(function(){ res(null); }, 2000); })
    ]);
    if (r && r.value) {
      const loaded = JSON.parse(r.value);
      if (loaded.schedules) DB.schedules = loaded.schedules;
      if (loaded.tournaments && loaded.tournaments.length > 0) DB.tournaments = loaded.tournaments;
      if (loaded.results) DB.results = loaded.results;
    }
  } catch(e){}
}

// ── HELPERS ──
function nextId(arr) { return Math.max.apply(null, [0].concat(arr.map(function(x){ return x.id; }))) + 1; }
function typePill(type) {
  if (type==='tournament') return '<span class="pill pill-gold">大会</span>';
  if (type==='league') return '<span class="pill pill-blue">リーグ</span>';
  return '<span class="pill pill-green">練習試合</span>';
}
function fmtPill(f) { return f ? '<span class="pill pill-purple">'+f+'</span>' : ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── ADMIN ──
function toggleAdmin() {
  if (isAdmin) { isAdmin = false; }
  else { openLoginSheet(); return; }
  document.getElementById('adminBtn').textContent = '🔒 管理者';
  document.getElementById('adminBtn').classList.remove('active');
  document.getElementById('adminBar').classList.remove('show');
  renderAll();
}
function activateAdmin() {
  isAdmin = true;
  document.getElementById('adminBtn').textContent = '🔓 管理中';
  document.getElementById('adminBtn').classList.add('active');
  document.getElementById('adminBar').classList.add('show');
  renderAll();
}

// ── TABS ──
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── SHEET ──
function openSheet(title, html) {
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheet')) return;
  document.getElementById('sheet').classList.remove('open');
  editingId = null;
}
function closeSheetDirect() {
  document.getElementById('sheet').classList.remove('open');
  editingId = null;
}

// ── STATS ──
function renderStats() {
  var wins = DB.results.filter(function(r){ return r.homeScore > r.awayScore; }).length;
  var upcoming = DB.schedules.filter(function(s){ return s.status==='upcoming'||s.status==='today'; }).length;
  var stats = [
    {n:DB.tournaments.length, l:'大会数', c:'#f5c842'},
    {n:DB.schedules.length, l:'予定試合', c:'#f5c842'},
    {n:wins, l:'勝利数', c:'#6dda8a'},
    {n:upcoming, l:'今月', c:'#7ab8ff'},
  ];
  document.getElementById('statsBar').innerHTML = stats.map(function(s){

// BRACKET
function buildBracket(teams) {
  var n = teams.length;
  var slots = n<=2?2:n<=4?4:8;
  var pad = teams.slice();
  while(pad.length<slots) pad.push(null);
  var matches=[]; var mid=1;
  var rounds=Math.round(Math.log(slots)/Math.log(2));
  for(var r=1;r<=rounds;r++){
    var cnt=Math.round(slots/Math.pow(2,r));
    for(var i=0;i<cnt;i++) matches.push({id:mid++,round:r,slotA:null,slotB:null,winner:null});
  }
  var r1=matches.filter(function(m){ return m.round===1; });
  r1.forEach(function(m,i){ m.slotA=pad[i*2]||null; m.slotB=pad[i*2+1]||null; });
  return {teams:teams, matches:matches};
}
function renderBracket(t) {
  var bkt = t.bracket && t.bracket.matches && t.bracket.matches.length>0 ? t.bracket
    : (t.teamList && t.teamList.length>=2 ? buildBracket(t.teamList) : null);
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:12px;font-weight:700;color:#f5c842">🏆 トーナメント表</span>'+
    (isAdmin&&bkt?'<button style="background:none;border:1px solid rgba(232,64,64,.4);color:#e84040;font-size:11px;padding:3px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700" onclick="resetBracket()">リセット</button>':'')+
  '</div>';
  if (!bkt) return html+'<div style="font-size:12px;color:#8fa3bc;text-align:center;padding:16px 0">チームを2つ以上追加するとトーナメント表が表示されます</div>';
  if (isAdmin) html += '<div style="font-size:11px;color:#8fa3bc;margin-bottom:8px">✏️ チーム名をタップして勝者を選択</div>';
  var rounds = Math.max.apply(null, bkt.matches.map(function(m){ return m.round; }));
  var rl = {1:'1回戦',2:'準々決勝',3:'準決勝',4:'決勝'};
  if(rounds===1) rl[1]='決勝';
  else if(rounds===2){rl[1]='準決勝';rl[2]='決勝';}
  else if(rounds===3){rl[1]='1回戦';rl[2]='準決勝';rl[3]='決勝';}

  html += '<div class="bracket-wrap"><div class="bracket-inner">';
  for(var r=1;r<=rounds;r++){
    var ms = bkt.matches.filter(function(m){ return m.round===r; });
    var gap = (Math.pow(2,rounds-r)-1)*68;
    html += '<div class="bracket-round"><div class="bracket-round-label">'+(rl[r]||'第'+r+'回戦')+'</div>'+
      '<div class="bracket-matches" style="gap:'+gap+'px">';
    ms.forEach(function(m){
      html += '<div class="match-card">';
      [{s:m.slotA,w:m.winner&&m.winner===m.slotA},{s:m.slotB,w:m.winner&&m.winner===m.slotB}].forEach(function(sl,si){
        var cls='match-slot'+(sl.w?' winner':'')+(isAdmin&&sl.s&&m.slotB?' clickable':'');
        var onclick=isAdmin&&sl.s&&m.slotB?' onclick="setWinner('+m.id+',\''+esc(sl.s||'')+'\')\"':'';
        html+='<div class="'+cls+'"'+onclick+'>'+
          '<div class="slot-dot"></div>'+
          '<span class="slot-name">'+(sl.s?esc(sl.s):(!m.slotB&&si===1?'（不戦勝）':'未定'))+'</span>'+
          (sl.w?'<span style="font-size:9px">🏆</span>':'')+
        '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  }
  var fin = bkt.matches.find(function(m){ return m.round===rounds; });
  var ch = fin && fin.winner;
  html += '<div class="bracket-champion"><div class="champion-label">優勝</div>'+
    '<div class="champion-box'+(ch?' crowned':'')+'"><div style="font-size:18px">🏆</div>'+
    '<div class="champion-name">'+(ch?esc(ch):'―')+'</div></div></div>';
  html += '</div></div>';
  return html;
}
function setWinner(matchId, winner) {
  var t = detailTour;
  if (!t.bracket) t.bracket = buildBracket(t.teamList);
  t.bracket.matches = t.bracket.matches.map(function(m){ return m.id===matchId?Object.assign({},m,{winner:winner}):m; });
  var match = t.bracket.matches.find(function(m){ return m.id===matchId; });
  var nextRound = t.bracket.matches.filter(function(m){ return m.round===match.round+1; });
  if (nextRound.length) {
    var roundMs = t.bracket.matches.filter(function(m){ return m.round===match.round; });
    var idx = roundMs.findIndex(function(m){ return m.id===matchId; });
    var nmi = Math.floor(idx/2);
    var slot = idx%2===0?'slotA':'slotB';
    if (nextRound[nmi]) {
      t.bracket.matches = t.bracket.matches.map(function(m){
        if(m.id!==nextRound[nmi].id) return m;
        var upd=Object.assign({},m); upd[slot]=winner; return upd;
      });
    }
  }
  DB.tournaments = DB.tournaments.map(function(x){ return x.id===t.id?t:x; });
  stSave(); renderTournaments(); refreshDetail();
}
function resetBracket() {
  detailTour.bracket = buildBracket(detailTour.teamList||[]);
  DB.tournaments = DB.tournaments.map(function(x){ return x.id===detailTour.id?detailTour:x; });
  stSave(); renderTournaments(); refreshDetail();
}

        '<div class="result-team"><div class="result-team-name">'+esc(r.home)+'</div><div class="result-score" style="color:'+(win?'#f5c842':'#8fa3bc')+'">'+r.homeScore+'</div></div>'+
        '<div class="result-sep">–</div>'+
        '<div class="result-team"><div class="result-team-name">'+esc(r.away)+'</div><div class="result-score" style="color:'+(!win?'#f5c842':'#8fa3bc')+'">'+r.awayScore+'</div></div>'+
      '</div>'+
      (win?'<div class="result-label" style="color:#f5c842">🏆 勝利</div>':r.homeScore<r.awayScore?'<div class="result-label" style="color:#8fa3bc">惜敗</div>':'')+
      '<div class="admin-actions'+(isAdmin?' show':'')+'">'+
        '<button class="btn btn-outline btn-sm" onclick="openResForm('+r.id+')">編集</button>'+
        '<button class="btn btn-danger btn-sm" onclick="delRes('+r.id+')">削除</button>'+
      '</div></div></div>';
  });
  document.getElementById('panel-results').innerHTML = html;
}
function openResForm(id) {
  editingId = id||null;
  var r = id ? DB.results.find(function(x){ return x.id===id; }) : {};
  if (!r) r={};
  openSheet(id?'結果編集':'結果追加',
    '<div class="field"><label>日付</label><input type="date" id="rDate" value="'+esc(r.date||'')+'"></div>'+
    '<div class="field"><label>自チーム</label><input type="text" id="rHome" value="'+esc(r.home||'')+'" placeholder="例: kzyBC"></div>'+
    '<div class="field"><label>相手チーム</label><input type="text" id="rAway" value="'+esc(r.away||'')+'" placeholder="例: 北部イーグルス"></div>'+
    '<div class="row2"><div class="field"><label>自チームスコア</label><input type="number" id="rHS" value="'+esc(r.homeScore||0)+'" min="0"></div>'+
    '<div class="field"><label>相手スコア</label><input type="number" id="rAS" value="'+esc(r.awayScore||0)+'" min="0"></div></div>'+
    '<div class="field"><label>種別</label><select id="rType"><option value="league"'+(r.type==='league'?' selected':'')+'>リーグ</option><option value="tournament"'+(r.type==='tournament'?' selected':'')+'>大会</option><option value="practice"'+(r.type==='practice'?' selected':'')+'>練習試合</option></select></div>'+
    '<div class="field"><label>大会名</label><input type="text" id="rTname" value="'+esc(r.tournamentName||'')+'" placeholder="例: ふれあい大会"></div>'+
    '<div class="btn-row"><button class="btn btn-outline btn-full" onclick="closeSheetDirect()">キャンセル</button><button class="btn btn-primary btn-full" onclick="saveRes()">保存する</button></div>'
  );
}
function saveRes() {
  var obj = {
    id: editingId||nextId(DB.results),
    date: document.getElementById('rDate').value,
    home: document.getElementById('rHome').value,
    homeScore: parseInt(document.getElementById('rHS').value)||0,
    away: document.getElementById('rAway').value,
    awayScore: parseInt(document.getElementById('rAS').value)||0,
    type: document.getElementById('rType').value,
    tournamentName: document.getElementById('rTname').value,
  };
  if (editingId) { DB.results = DB.results.map(function(x){ return x.id===editingId?obj:x; }); }
  else { DB.results.push(obj); }
  stSave(); closeSheetDirect(); renderAll();
}
function delRes(id) {
  DB.results = DB.results.filter(function(x){ return x.id!==id; });
  stSave(); renderAll();
}

// LOGIN
function openLoginSheet() {
  openSheet('管理者ログイン',
    '<div class="field"><label>パスワード</label><input type="password" id="loginPw" placeholder="••••••••"></div>'+
    '<div id="loginErr" style="color:#e84040;font-size:12px;margin-bottom:8px;display:none">パスワードが違います</div>'+
    '<div style="font-size:11px;color:#8fa3bc;margin-bottom:14px">デモ用: baseball2025</div>'+
    '<div class="btn-row"><button class="btn btn-outline btn-full" onclick="closeSheetDirect()">キャンセル</button><button class="btn btn-primary btn-full" onclick="tryLogin()">ログイン</button></div>'
  );
}
function tryLogin() {
  var pw = document.getElementById('loginPw').value;
  if (pw==='baseball2025') { closeSheetDirect(); activateAdmin(); }
  else { document.getElementById('loginErr').style.display='block'; setTimeout(function(){ var el=document.getElementById('loginErr'); if(el) el.style.display='none'; },2000); }
}

// ── RENDER ALL ──
function renderAll() {
  renderStats();
  renderSchedule();
  renderTournaments();
  renderResults();
}

// ── INIT ──
stLoad().then(function(){ renderAll(); });
</script>
</body>
</html>
