<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>kzy ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1b2d;color:#f8faff;font-family:'Noto Sans JP',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#243b5a;border-radius:2px}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;letter-spacing:.04em;margin-bottom:6px}
.login-logo span{color:#f5c842}
.login-sub{font-size:13px;color:#8fa3bc;margin-bottom:40px}
.login-box{background:#1a2e4a;border-radius:20px;border:1px solid rgba(74,158,255,.2);padding:28px 24px;width:100%;max-width:360px}
.login-box h2{font-size:16px;font-weight:700;margin-bottom:20px;text-align:center}
.login-err{color:#e84040;font-size:12px;margin-bottom:10px;display:none;text-align:center}

/* MAIN */
.main-screen{display:none;min-height:100vh;padding-bottom:80px}

/* HEADER */
header{background:linear-gradient(135deg,#0f1b2d,#1a2e4a);border-bottom:2.5px solid #f5c842;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.5)}
.hi{padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.04em}
.logo span{color:#f5c842}
.hbtn{background:rgba(255,255,255,.1);border:none;color:#8fa3bc;font-family:inherit;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer}
.hbtn.adm{background:rgba(245,200,66,.15);color:#f5c842}
.abar{background:rgba(245,200,66,.12);border-top:1px solid rgba(245,200,66,.2);padding:4px 16px;font-size:11px;color:#f5c842;font-weight:700;display:none}
.abar.show{display:block}

/* CONTENT */
.content{padding:12px 14px 0}
.tp{display:none}.tp.active{display:block}
.stit{font-size:14px;font-weight:700;color:#8fa3bc;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

/* CARDS */
.card{background:#1a2e4a;border-radius:14px;border:1px solid rgba(74,158,255,.13);overflow:hidden;margin-bottom:10px}
.card.td{border:1.5px solid #f5c842}
.tbar{background:#f5c842;padding:3px 14px;font-size:11px;font-weight:800;color:#0f1b2d}
.cb{padding:13px 14px}

/* PILLS */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pg{background:rgba(245,200,66,.18);color:#f5c842}
.pb{background:rgba(74,158,255,.2);color:#7ab8ff}
.pp{background:rgba(192,132,252,.18);color:#c084fc}
.pgrn{background:rgba(45,160,80,.25);color:#6dda8a}

/* BUTTONS */
.btn{border:none;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:9px 16px;font-size:13px}
.btp{background:#f5c842;color:#0f1b2d}
.bto{background:transparent;border:1.5px solid #4a9eff;color:#4a9eff}
.btd{background:#e84040;color:#fff}
.bts{padding:6px 12px;font-size:12px}
.btf{width:100%}
.btg{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3);color:#7ab8ff;font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;padding:9px;font-size:13px;width:100%}

/* SCHEDULE */
.sr{display:flex;justify-content:space-between;align-items:flex-start}
.sd{text-align:center;background:rgba(255,255,255,.06);border-radius:9px;padding:5px 9px;min-width:52px;flex-shrink:0}
.sd .d{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1}
.sd .w{font-size:10px;color:#8fa3bc}
.si{flex:1;padding:0 10px}
.sn2{font-size:14px;font-weight:700;line-height:1.3}
.sv{font-size:11px;color:#8fa3bc;margin-top:3px}
.aa{display:none;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.aa.show{display:flex}

/* TOURNAMENT CARD */
.tn{font-size:15px;font-weight:800;margin-bottom:5px}
.tpi{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tm{font-size:12px;color:#8fa3bc;margin-top:4px;display:flex;gap:6px;align-items:flex-start}
.tf{padding:0 14px 13px;display:flex;gap:7px}

/* RESULTS */
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rs{display:flex;align-items:center;justify-content:space-around}
.rt{text-align:center;flex:1}
.rtn{font-size:12px;font-weight:700;margin-bottom:3px}
.rsc{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;line-height:1}
.rsep{font-size:18px;color:rgba(255,255,255,.2);font-weight:700;padding:0 4px;margin-top:16px}
.rl2{text-align:center;margin-top:8px;font-size:11px;font-weight:700}

/* STATS TAB */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-big{background:#1a2e4a;border-radius:14px;padding:16px;text-align:center;border:1px solid rgba(74,158,255,.12)}
.stat-big .n{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:800;line-height:1}
.stat-big .l{font-size:11px;color:#8fa3bc;margin-top:4px}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,20,35,.97);border-top:1px solid rgba(74,158,255,.18);backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:6px 0 max(10px,env(safe-area-inset-bottom))}
.nb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#8fa3bc;cursor:pointer;padding:4px 28px;font-family:inherit;min-width:72px;position:relative}
.nb.active{color:#f5c842}
.nb.active::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:#f5c842;border-radius:0 0 4px 4px}
.ni{font-size:22px}.nl{font-size:11px;font-weight:500}.nb.active .nl{font-weight:700}

/* SHEET */
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:400;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.so.open{display:flex}
.sh{background:#152438;border-radius:20px 20px 0 0;border:1px solid rgba(74,158,255,.25);width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.shd{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0}
.shh{padding:13px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#152438}
.sht{font-size:16px;font-weight:700}
.shc{background:rgba(255,255,255,.1);border:none;color:#f8faff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.shb{padding:14px 18px 32px}

/* FORM */
.fi{margin-bottom:12px}
.fi label{display:block;font-size:11px;color:#8fa3bc;margin-bottom:4px;font-weight:600}
.fi input,.fi select,.fi textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:10px 13px;color:#f8faff;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
.fi select{background:#1a2e4a}.fi textarea{resize:vertical}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.br{display:flex;gap:8px;margin-top:8px}

/* INNER TABS */
.it{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:10px;padding:3px;margin-bottom:14px}
.itb{flex:1;background:transparent;border:none;color:#8fa3bc;border-radius:8px;padding:7px 3px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.itb.active{background:rgba(74,158,255,.2);color:#7ab8ff}

/* STANDINGS */
.stbl{background:rgba(0,0,0,.2);border-radius:10px;overflow:hidden}
.sth,.str{display:grid;grid-template-columns:1.2rem 1fr repeat(4,1.8rem);gap:0 5px;padding:7px 10px;font-size:11px;align-items:center}
.sth{color:#8fa3bc;font-weight:700;border-bottom:1px solid rgba(255,255,255,.06)}
.str{font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.str:last-child{border-bottom:none}
.str.top{background:rgba(245,200,66,.06)}
.srk{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#8fa3bc}
.str.top .srk{color:#f5c842}
.spts{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#f5c842}

/* TEAMS */
.trw{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:9px;padding:8px 12px;margin-bottom:6px}
.trn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#8fa3bc;min-width:18px}
.trt{font-size:14px;font-weight:600}
.trm{background:none;border:none;color:#e84040;cursor:pointer;font-size:17px;line-height:1}
.tar{display:flex;gap:7px;margin-top:8px}
.tar input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:8px 11px;color:#f8faff;font-size:13px;outline:none;font-family:inherit}
.tab2{background:rgba(74,158,255,.2);border:1px solid rgba(74,158,255,.35);color:#7ab8ff;border-radius:10px;padding:0 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;white-space:nowrap}

/* RULES */
.rg{margin-bottom:18px}
.rgt{font-size:11px;font-weight:700;color:#f5c842;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.ri{display:flex;gap:9px;margin-bottom:6px;font-size:13px;line-height:1.6;color:rgba(248,250,255,.85)}
.rd{width:5px;height:5px;background:#4a9eff;border-radius:50%;margin-top:8px;flex-shrink:0}
.em{text-align:center;padding:40px 0;color:#8fa3bc;font-size:14px}
.sp{display:none}.sp.active{display:block}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">⚾ kzy <span>ポータル</span></div>
  <div class="login-sub">小束山少年団野球部 父兄専用</div>
  <div class="login-box">
    <h2>🔒 ログイン</h2>
    <div class="fi"><label>パスワード</label><input type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()"></div>
    <div class="login-err" id="loginErr">パスワードが違います</div>
    <button class="btn btp btf" onclick="tryLogin()">ログイン</button>
  </div>
</div>

<!-- MENU SCREEN -->
<div class="login-screen" id="menuScreen" style="display:none">
  <div class="login-logo">⚾ kzy <span>ポータル</span></div>
  <div class="login-sub" id="menuSub">ようこそ！</div>
  <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;margin-top:8px">
    <button onclick="goTo('info')" style="background:#1a2e4a;border:1px solid rgba(74,158,255,.25);border-radius:18px;padding:24px 20px;color:#f8faff;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:16px;-webkit-tap-highlight-color:transparent">
      <span style="font-size:36px">📋</span>
      <div><div style="font-size:18px;font-weight:800;margin-bottom:4px">info</div><div style="font-size:12px;color:#8fa3bc">試合日程・大会情報・ルール確認</div></div>
    </button>
    <button onclick="goTo('stats')" style="background:#1a2e4a;border:1px solid rgba(74,158,255,.25);border-radius:18px;padding:24px 20px;color:#f8faff;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:16px;-webkit-tap-highlight-color:transparent">
      <span style="font-size:36px">📊</span>
      <div><div style="font-size:18px;font-weight:800;margin-bottom:4px">stats</div><div style="font-size:12px;color:#8fa3bc">試合結果・勝敗サマリー</div></div>
    </button>
    <button onclick="logout()" style="background:none;border:none;color:#8fa3bc;font-family:inherit;font-size:13px;cursor:pointer;margin-top:4px">ログアウト</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="main-screen" id="mainScreen">
  <header>
    <div class="hi">
      <div class="logo" id="mainTitle">⚾ kzy <span>ポータル</span></div>
      <div style="display:flex;gap:6px">
        <button class="hbtn adm" id="adminBtn" onclick="toggleAdmin()" style="display:none">✏️ 管理</button>
        <button class="hbtn" onclick="backToMenu()">← メニュー</button>
      </div>
    </div>
    <div class="abar" id="adminBar">✏️ 管理者モード — 追加・編集・削除が可能</div>
  </header>

  <div class="content" style="padding-bottom:0">
    <!-- INFO -->
    <div class="tp active" id="panel-info" style="padding-bottom:80px">
      <!-- sub tabs -->
      <div id="sub-schedule" class="sp active">
        <div style="padding:4px 0 10px">
          <div class="stit"><span>📅 試合日程</span><span id="schedAddBtn"></span></div>
          <div id="schedList"></div>
        </div>
      </div>
      <div id="sub-tournaments" class="sp">
        <div style="padding:4px 0 10px">
          <div class="stit"><span>🏆 大会一覧</span><span id="tourAddBtn"></span></div>
          <div id="tourList"></div>
        </div>
      </div>
      <div id="sub-results" class="sp">
        <div style="padding:4px 0 10px">
          <div class="stit"><span>📊 試合結果</span><span id="resAddBtn"></span></div>
          <div class="stats-grid" id="statsSummary"></div>
          <div id="resList"></div>
        </div>
      </div>
    </div>

    <!-- STATS (standalone from menu) -->
    <div class="tp" id="panel-stats" style="padding-bottom:20px">
      <div style="padding:4px 0 10px">
        <div class="stit"><span>📊 試合結果</span><span id="resAddBtn2"></span></div>
        <div class="stats-grid" id="statsSummary2"></div>
        <div id="resList2"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV (infoのみ表示) -->
  <nav id="bottomNav">
    <button class="nb active" id="nb-schedule" onclick="switchSub('schedule',this)"><span class="ni">📅</span><span class="nl">日程</span></button>
    <button class="nb" id="nb-tournaments" onclick="switchSub('tournaments',this)"><span class="ni">🏆</span><span class="nl">大会</span></button>
  </nav>
</div>

<!-- SHEET -->
<div class="so" id="sheet" onclick="closeSheet(event)">
  <div class="sh">
    <div class="shd"></div>
    <div class="shh">
      <div class="sht" id="sheetTitle"></div>
      <button class="shc" onclick="closeSheetDirect()">✕</button>
    </div>
    <div class="shb" id="sheetBody"></div>
  </div>
</div>

<script>
// ━━━ RULES ━━━
var RULES={
  1:[ // ナゲセケンコー杯
    {g:"大会概要",i:["第17回 ナガセケンコー杯ジュニア交流大会","2026年3月29日（日）9:30〜 横尾小学校","主催：KSBL（西神戸須磨軟式少年少女野球連盟）","後援：ナガセケンコー株式会社","協賛：須磨区役所・神戸新聞社・オリックス野球クラブ株式会社","目的：新4年生以下の球児が交流し、勝負にこだわらず野球を楽しむ"]},
    {g:"試合方式",i:["5回制・70分","塁間：21m、バッテリー間：14m","コールドゲーム：3回10点差・4回7点差","同点：最終イニング出場18人で抽選","決勝のみ：1アウト満塁タイブレーク1イニング→同点なら抽選","4回終了後成立（降雨・日没等による中止時）"]},
    {g:"投手規定",i:["決勝のみ60球制限（対戦打者完了まで）","練習投球：初回・交代時7球、その他3球","ボーク適用なし（不利益と審判判断時はノーカウント・監督と投手に指導）","シートノックは4分（準々決勝から）"]},
    {g:"用具・チーム規定",i:["バット：JSBB公認のみ（少年用ハイコン複合バット可、一般用複合バット不可）","DH制は採用しない","集合：試合開始45分前、主将はメンバー表4部提出し先後攻のトスを行う","ベンチ：若番が1塁側（本部指示が優先）、指導者はスコアラー含め5人まで","監督に抗議権なし（プレーの確認のみ可）","ホームランライン：原則60m以上（会場により本部指示に従う）"]},
    {g:"その他",i:["審判：相互審判が原則（各連盟・協会・リーグの審判服着用）","試合球：本部が原則用意（ナガセケンコー球）、本部指示で各チームが提供する場合あり","雨天中止：午前7時30分決定（各チームは大会本部に確認）","グラウンドでの負傷は主催者が責任を持たない（各チームで責任を持って対応）","横尾小学校への車の乗り入れ：左折入場・左折退場厳守"]},
  ],
  2:[ // 前期ジュニアリーグ
    {g:"リーグ概要",i:["2026年 前期リーグ戦（Jrの部）","主催：北神戸少年野球連盟","後援：神戸新聞社","協賛：内外ゴム株式会社・オリックス野球クラブ株式会社"]},
    {g:"順位決定方式",i:["勝点方式（勝利3点・引き分け1点）","①勝点の多いチームが上位","②同勝点→勝利数の多いチームが上位","③同勝利数→リーグ戦での勝利チームが上位","④直接対決で引分・3チーム以上相星→失点の少ないチームが上位","⑤同失点→総得失点差の多いチームが上位","⑥1位〜2位間で決定できない場合→決定戦"]},
    {g:"小束山の結果（Aブロック）",i:["1位：白川（勝点6・2勝0負1分）","2位：長坂（勝点3・1勝0負0分）","2位：花谷（勝点3・1勝0負0分）","2位：妙法寺（勝点3・1勝0負0分）","5位：有野台（勝点3・1勝1負0分）","5位：御影（勝点3・1勝1負0分）","7位：長尾道場（勝点0・0勝2負0分）","7位：鹿の子台（勝点0・0勝2負0分）","9位：小束山（勝点0・0勝1負0分）"]},
  ],
  3:[ // 西区ジュニアリーグ
    {g:"情報",i:["主催：西区連盟","詳細情報は後日追加予定"]},
  ],
  4:[ // ふれあい大会
    {g:"基本",i:["神戸市少年団野球リーグに準じる","集合：試合開始30分前（遅延連絡なき場合は不戦敗）","試合球：マルエスまたはナイガイJ号（各チーム2球持参）"]},
    {g:"試合・イニング",i:["6回制・80分","リーグ戦：同点で6回または時間切れは引き分け","トーナメント：同点で6回後タイブレーク1イニング→抽選","コールド：4回終了10点差・5回終了7点差（決勝はなし）"]},
    {g:"投手",i:["A・Bブロック：70球まで（対戦中打者完了まで可）","Cブロック：3回または60球まで（対戦中打者完了まで可）","タイム：攻撃2回・守備2回（1イニング中1回のみ）"]},
    {g:"Cブロック特別ルール",i:["投手板〜本塁：14m、塁間：21m","攻撃側5得点でチェンジ（ホームラン・エンタイトルは例外）","得点差コールドなし","ボーク：注意のみ"]},

function sbFetch(method, body){

function renderStats(){
  var results=DB.results;
  var wins=results.filter(function(r){var mh=r.home===MY_TEAM;return(mh&&r.homeScore>r.awayScore)||(!mh&&r.awayScore>r.homeScore);}).length;
  var losses=results.filter(function(r){var mh=r.home===MY_TEAM;return(mh&&r.homeScore<r.awayScore)||(!mh&&r.awayScore<r.homeScore);}).length;
  var draws=results.filter(function(r){return r.homeScore===r.awayScore;}).length;
  document.getElementById('resAddBtn').innerHTML=isAdmin?'<button class="btn bto bts" onclick="openRF()">＋ 追加</button>':'';

    '<div class="stat-big"><div class="n" style="color:#e84040">'+losses+'</div><div class="l">敗戦</div></div>'+
    '<div class="stat-big"><div class="n" style="color:#8fa3bc">'+draws+'</div><div class="l">引き分け</div></div>'+
    '<div class="stat-big"><div class="n" style="color:#f5c842">'+results.length+'</div><div class="l">試合数</div></div>';

    var mh=r.home===MY_TEAM;

    var lose=(mh&&r.homeScore<r.awayScore)||(!mh&&r.awayScore<r.homeScore);
    var d=r.date?r.date.slice(5).replace('-','/'):'' ;

        '<div class="rt"><div class="rtn">'+esc(opp)+'</div><div class="rsc" style="color:'+(lose?'#f5c842':'#8fa3bc')+'">'+oppScore+'</div></div>'+

  });

  editingId=id||null;var t=id?DB.tournaments.find(function(x){return x.id===id;}):{};if(!t)t={};
  openSheet(id?'大会編集':'大会追加',
    '<div class="fi"><label>大会名</label><input type="text" id="tN" value="'+esc(t.name||'')+'" placeholder="例: ふれあい大会"></div>'+
    '<div class="fi"><label>種別</label><select id="tTp"><option value="league"'+(t.type==='league'?' selected':'')+'>リーグ</option><option value="tournament"'+(t.type==='tournament'?' selected':'')+'>大会</option></select></div>'+
    '<div class="fi"><label>方式</label><select id="tFm"><option value="">なし</option><option value="リーグ戦"'+(t.format==='リーグ戦'?' selected':'')+'>リーグ戦</option><option value="トーナメント戦"'+(t.format==='トーナメント戦'?' selected':'')+'>トーナメント戦</option><option value="リーグ＋トーナメント"'+(t.format==='リーグ＋トーナメント'?' selected':'')+'>リーグ＋トーナメント</option></select></div>'+
    '<div class="fi"><label>開催期間</label><input type="text" id="tPr" value="'+esc(t.period||'')+'" placeholder="例: 3月〜"></div>'+
    '<div class="fi"><label>主催・備考</label><input type="text" id="tPz" value="'+esc(t.prize||'')+'" placeholder="例: 主催：KSBL"></div>'+
    '<div class="br"><button class="btn bto btf" onclick="closeSheetDirect()">キャンセル</button><button class="btn btp btf" onclick="saveT()">保存する</button></div>'
  );
}
function saveT(){
  var e=editingId?DB.tournaments.find(function(x){return x.id===editingId;}):{};
  var o=Object.assign({},e||{},{id:editingId||nid(DB.tournaments),name:document.getElementById('tN').value,type:document.getElementById('tTp').value,format:document.getElementById('tFm').value,period:document.getElementById('tPr').value,prize:document.getElementById('tPz').value,teamList:(e&&e.teamList)||[],standings:(e&&e.standings)||[],records:(e&&e.records)||[]});
  if(editingId)DB.tournaments=DB.tournaments.map(function(x){return x.id===editingId?o:x;});else DB.tournaments.push(o);
  stSave();closeSheetDirect();renderAll();
}
function delT(id){DB.tournaments=DB.tournaments.filter(function(x){return x.id!==id;});stSave();renderAll();}

// ━━━ DETAIL SHEET ━━━
function openD(id){detailTour=DB.tournaments.find(function(x){return x.id===id;});detailTab='teams';renderDS();}
function renderDS(){
  var t=detailTour;if(!t)return;
  var sl=t.type==='league'?'📊 順位':'⚾ 勝敗';
  var tabs=[{id:'teams',l:'👥 チーム'},{id:'status',l:sl},{id:'rules',l:'📋 ルール'}];
  var th='<div class="it">'+tabs.map(function(x){return'<button class="itb'+(detailTab===x.id?' active':'')+'" onclick="switchDT(\''+x.id+'\')">'+x.l+'</button>';}).join('')+'</div>';
  var bh='';
  if(detailTab==='teams')bh=renderTeams(t);
  else if(detailTab==='status')bh=t.type==='league'?renderST(t):renderRecords(t);
  else bh=renderRL(t.id);
  openSheet(t.name,th+bh);
}
function switchDT(tab){detailTab=tab;renderDS();}
function refreshD(){detailTour=DB.tournaments.find(function(x){return x.id===detailTour.id;});renderDS();}

// TEAMS
function renderTeams(t){
  var h='<div style="font-size:12px;font-weight:700;color:#f5c842;margin-bottom:9px">👥 参加チーム</div>';
  if(!t.teamList||!t.teamList.length)h+='<div style="font-size:12px;color:#8fa3bc;margin-bottom:8px">'+(isAdmin?'チームを追加してください':'チームが登録されていません')+'</div>';
  (t.teamList||[]).forEach(function(name,i){
    var isMe=name.indexOf('小束山')>=0;
    h+='<div class="trw" style="'+(isMe?'border:1px solid rgba(245,200,66,.3);background:rgba(245,200,66,.06)':'')+'">'+
      '<div style="display:flex;align-items:center;gap:9px"><span class="trn">'+(i+1)+'</span>'+
      '<span class="trt">'+esc(name)+'</span>'+(isMe?'<span class="pill pg" style="font-size:10px">自</span>':'')+'</div>'+
      (isAdmin?'<button class="trm" onclick="removeTeam(\''+esc(name)+'\')">×</button>':'')+
    '</div>';
  });
  if(isAdmin)h+='<div class="tar"><input type="text" id="nti" placeholder="チーム名を入力…" onkeydown="if(event.key===\'Enter\')addTeam()"><button class="tab2" onclick="addTeam()">追加</button></div>';
  return h;
}
function addTeam(){
  var v=(document.getElementById('nti').value||'').trim();
  if(!v||!detailTour)return;
  if((detailTour.teamList||[]).indexOf(v)>=0)return;
  detailTour.teamList=detailTour.teamList||[];detailTour.teamList.push(v);
  if(detailTour.type==='league'){detailTour.standings=detailTour.standings||[];if(!detailTour.standings.find(function(s){return s.name===v;}))detailTour.standings.push({name:v,w:0,l:0,d:0});}
  DB.tournaments=DB.tournaments.map(function(x){return x.id===detailTour.id?detailTour:x;});
  stSave();renderAll();refreshD();
}
function removeTeam(name){
  if(!detailTour)return;
  detailTour.teamList=(detailTour.teamList||[]).filter(function(x){return x!==name;});
  detailTour.standings=(detailTour.standings||[]).filter(function(s){return s.name!==name;});
  DB.tournaments=DB.tournaments.map(function(x){return x.id===detailTour.id?detailTour:x;});
  stSave();renderAll();refreshD();
}

// STANDINGS
function renderST(t){
  var rows=(t.standings||[]).slice().sort(function(a,b){return(b.w*3+(b.d||0))-(a.w*3+(a.d||0));});
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:#f5c842">📊 順位表</span>'+(isAdmin?'<button style="background:none;border:1px solid rgba(74,158,255,.4);color:#7ab8ff;font-size:11px;padding:3px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700" onclick="openSE()">編集</button>':'')+'</div>';
  if(!rows.length)return h+'<div style="font-size:12px;color:#8fa3bc;text-align:center;padding:10px 0">チームを追加すると表示されます</div>';
  h+='<div class="stbl"><div class="sth"><span>#</span><span>チーム</span><span style="text-align:center">勝</span><span style="text-align:center">負</span><span style="text-align:center">分</span><span style="text-align:center">点</span></div>';
  rows.forEach(function(r,i){
    var isMe=r.name===MY_TEAM||r.name.indexOf('小束山')>=0;
    h+='<div class="str'+(i===0?' top':'')+'" style="'+(isMe?'background:rgba(245,200,66,.08)':'')+'">'+
      '<span class="srk">'+(i+1)+'</span>'+
      '<span style="font-weight:'+(i===0||isMe?700:400)+';color:'+(isMe?'#f5c842':'')+'">'+esc(r.name)+'</span>'+
      '<span style="text-align:center;color:#6dda8a;font-weight:700">'+r.w+'</span>'+
      '<span style="text-align:center;color:#e84040">'+r.l+'</span>'+
      '<span style="text-align:center;color:#8fa3bc">'+(r.d||0)+'</span>'+
      '<span class="spts" style="text-align:center">'+(r.w*3+(r.d||0))+'</span></div>';
  });
  return h+'</div>';
}
function openSE(){
  var t=detailTour;
  var rows=(t.teamList||[]).map(function(name){var e=(t.standings||[]).find(function(s){return s.name===name;})||{};return{name:name,w:e.w||0,l:e.l||0,d:e.d||0};});
  var th='<div class="it"><button class="itb" onclick="switchDT(\'teams\')">👥 チーム</button><button class="itb active">📊 順位</button><button class="itb" onclick="switchDT(\'rules\')">📋 ルール</button></div>';
  var fh=rows.map(function(r,i){return'<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:#f5c842;margin-bottom:5px">'+esc(r.name)+'</div><div class="r2" style="grid-template-columns:1fr 1fr 1fr">'+['w','l','d'].map(function(k,ki){var lb=['勝','負','分'][ki];return'<div class="fi"><label>'+lb+'</label><input type="number" id="st_'+i+'_'+k+'" value="'+r[k]+'" min="0" style="text-align:center"></div>';}).join('')+'</div></div>';}).join('');
  openSheet(t.name,th+(rows.length?fh:'<div style="color:#8fa3bc;font-size:13px">チームを先に追加してください</div>')+'<div class="br"><button class="btn bto btf" onclick="refreshD()">キャンセル</button><button class="btn btp btf" onclick="saveSt('+JSON.stringify(rows.map(function(r){return r.name;}))+')">保存する</button></div>');
}
function saveSt(names){
  detailTour.standings=names.map(function(name,i){return{name:name,w:parseInt(document.getElementById('st_'+i+'_w').value)||0,l:parseInt(document.getElementById('st_'+i+'_l').value)||0,d:parseInt(document.getElementById('st_'+i+'_d').value)||0};});
  DB.tournaments=DB.tournaments.map(function(x){return x.id===detailTour.id?detailTour:x;});
  stSave();renderAll();detailTab='status';refreshD();
}

// RECORDS (勝敗記録)
function renderRecords(t){
  var records=t.records||[];
  var wins=records.filter(function(r){return r.result==='win';}).length;
  var losses=records.filter(function(r){return r.result==='loss';}).length;
  var draws=records.filter(function(r){return r.result==='draw';}).length;
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<span style="font-size:12px;font-weight:700;color:#f5c842">⚾ 小束山 勝敗記録</span>'+
    (isAdmin?'<button style="background:rgba(74,158,255,.2);border:1px solid rgba(74,158,255,.4);color:#7ab8ff;font-size:11px;padding:3px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700" onclick="openRecordForm()">＋ 追加</button>':'')+'</div>';
  if(records.length){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'+
      '<div style="background:rgba(109,218,138,.1);border:1px solid rgba(109,218,138,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:32px;font-weight:800;color:#6dda8a;line-height:1">'+wins+'</div><div style="font-size:10px;color:#8fa3bc;margin-top:3px">勝</div></div>'+
      '<div style="background:rgba(232,64,64,.1);border:1px solid rgba(232,64,64,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:32px;font-weight:800;color:#e84040;line-height:1">'+losses+'</div><div style="font-size:10px;color:#8fa3bc;margin-top:3px">敗</div></div>'+
      '<div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;text-align:center"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:32px;font-weight:800;color:#8fa3bc;line-height:1">'+draws+'</div><div style="font-size:10px;color:#8fa3bc;margin-top:3px">分</div></div>'+
    '</div>';
  }
  if(!records.length){h+='<div style="font-size:12px;color:#8fa3bc;text-align:center;padding:20px 0">試合記録がありません</div>';}
  else{records.slice().reverse().forEach(function(r){
    var isWin=r.result==='win',isLoss=r.result==='loss';
    var col=isWin?'#6dda8a':isLoss?'#e84040':'#8fa3bc';
    var label=isWin?'勝':isLoss?'敗':'分';
    h+='<div style="background:#1a2e4a;border-radius:11px;padding:11px 14px;margin-bottom:8px;border:1px solid '+(isWin?'rgba(109,218,138,.25)':isLoss?'rgba(232,64,64,.2)':'rgba(255,255,255,.08)')+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-size:10px;color:#8fa3bc;margin-bottom:3px">'+esc(r.date||'')+' '+esc(r.round||'')+'</div>'+
        '<div style="font-size:14px;font-weight:700">vs '+esc(r.opponent)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:26px;font-weight:800;color:#f8faff">'+esc(String(r.score||''))+'</div>'+
          '<div style="background:'+col+';color:#0f1b2d;font-size:12px;font-weight:800;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center">'+label+'</div>'+
        '</div>'+
      '</div>'+
      (isAdmin?'<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)"><button class="btn btd bts" onclick="deleteRecord(\''+esc(r.id||'')+'\')">削除</button></div>':'')+
    '</div>';
  });}
  return h;
}
function openRecordForm(){
  var t=detailTour;
  var th='<div class="it"><button class="itb" onclick="switchDT(\'teams\')">👥 チーム</button><button class="itb active">⚾ 勝敗</button><button class="itb" onclick="switchDT(\'rules\')">📋 ルール</button></div>';
  openSheet(t.name,th+
    '<div class="fi"><label>日付</label><input type="date" id="recD"></div>'+
    '<div class="fi"><label>ラウンド</label><input type="text" id="recR" placeholder="例: 1回戦"></div>'+
    '<div class="fi"><label>相手チーム</label><input type="text" id="recO" placeholder="例: 白川ホーネッツ"></div>'+
    '<div class="fi"><label>スコア</label><input type="text" id="recSc" placeholder="例: 3-2"></div>'+
    '<div class="fi"><label>結果</label><select id="recRes"><option value="win">勝</option><option value="loss">敗</option><option value="draw">分</option></select></div>'+
    '<div class="br"><button class="btn bto btf" onclick="refreshD()">キャンセル</button><button class="btn btp btf" onclick="saveRecord()">保存する</button></div>'
  );
}
function saveRecord(){
  var t=detailTour;t.records=t.records||[];
  t.records.push({id:String(Date.now()),date:document.getElementById('recD').value,round:document.getElementById('recR').value,opponent:document.getElementById('recO').value,score:document.getElementById('recSc').value,result:document.getElementById('recRes').value});
  DB.tournaments=DB.tournaments.map(function(x){return x.id===t.id?t:x;});
  stSave();renderAll();detailTab='status';refreshD();
}
function deleteRecord(rid){
  var t=detailTour;t.records=(t.records||[]).filter(function(r){return r.id!==rid;});
  DB.tournaments=DB.tournaments.map(function(x){return x.id===t.id?t:x;});
  stSave();renderAll();refreshD();
}

// RULES
function renderRL(tid){
  var rules=RULES[tid]||[];
  if(!rules.length)return'<div class="em">ルールが登録されていません</div>';
  return rules.map(function(rg){return'<div class="rg"><div class="rgt">⚾ '+esc(rg.g)+'</div>'+rg.i.map(function(item){return'<div class="ri"><div class="rd"></div><div>'+esc(item)+'</div></div>';}).join('')+'</div>';}).join('');
}

// ━━━ RESULTS CRUD ━━━
function renderStatsStandalone(){
  var el2=document.getElementById('resAddBtn2');
  if(el2)el2.innerHTML=isAdmin?'<button class="btn bto bts" onclick="openRF()">＋ 追加</button>':'';
  var results=DB.results;
  var wins=results.filter(function(r){var mh=r.home===MY_TEAM;return(mh&&r.homeScore>r.awayScore)||(!mh&&r.awayScore>r.homeScore);}).length;
  var losses=results.filter(function(r){var mh=r.home===MY_TEAM;return(mh&&r.homeScore<r.awayScore)||(!mh&&r.awayScore<r.homeScore);}).length;
  var draws=results.filter(function(r){return r.homeScore===r.awayScore;}).length;
  var ss2=document.getElementById('statsSummary2');
  if(ss2)ss2.innerHTML='<div class="stat-big"><div class="n" style="color:#6dda8a">'+wins+'</div><div class="l">勝利</div></div><div class="stat-big"><div class="n" style="color:#e84040">'+losses+'</div><div class="l">敗戦</div></div><div class="stat-big"><div class="n" style="color:#8fa3bc">'+draws+'</div><div class="l">引き分け</div></div><div class="stat-big"><div class="n" style="color:#f5c842">'+results.length+'</div><div class="l">試合数</div></div>';
  var rl2=document.getElementById('resList2');
  if(!rl2)return;
  var rh='';
  if(!results.length)rh='<div class="em">⚾ 試合結果がありません</div>';
  results.slice().reverse().forEach(function(r){
    var mh=r.home===MY_TEAM;
    var win=(mh&&r.homeScore>r.awayScore)||(!mh&&r.awayScore>r.homeScore);
    var lose=(mh&&r.homeScore<r.awayScore)||(!mh&&r.awayScore<r.homeScore);
    var d=r.date?r.date.slice(5).replace('-','/'):'';
    var myScore=mh?r.homeScore:r.awayScore;
    var oppScore=mh?r.awayScore:r.homeScore;
    var opp=mh?r.away:r.home;
    rh+='<div class="card"><div class="cb"><div class="rh"><span style="font-size:11px;color:#8fa3bc">'+esc(d)+' · '+esc(r.tournamentName)+'</span>'+tpill(r.type)+'</div><div class="rs"><div class="rt"><div class="rtn">'+esc(MY_TEAM)+'</div><div class="rsc" style="color:'+(win?'#f5c842':'#8fa3bc')+'">'+myScore+'</div></div><div class="rsep">–</div><div class="rt"><div class="rtn">'+esc(opp)+'</div><div class="rsc" style="color:'+(lose?'#f5c842':'#8fa3bc')+'">'+oppScore+'</div></div></div>'+(win?'<div class="rl2" style="color:#f5c842">🏆 勝利</div>':lose?'<div class="rl2" style="color:#8fa3bc">惜敗</div>':'')+'<div class="aa'+(isAdmin?' show':'')+'"><button class="btn bto bts" onclick="openRF('+r.id+')">編集</button><button class="btn btd bts" onclick="delR('+r.id+')">削除</button></div></div></div>';
  });
  rl2.innerHTML=rh;
}
function openRF(id){
  editingId=id||null;var r=id?DB.results.find(function(x){return x.id===id;}):{};if(!r)r={};
  openSheet(id?'結果編集':'結果追加',
    '<div class="fi"><label>日付</label><input type="date" id="rD" value="'+esc(r.date||'')+'"></div>'+
    '<div class="fi"><label>自チーム</label><input type="text" id="rH" value="'+esc(r.home||MY_TEAM)+'" placeholder="例: 小束山"></div>'+
    '<div class="fi"><label>相手チーム</label><input type="text" id="rA" value="'+esc(r.away||'')+'" placeholder="例: 北部イーグルス"></div>'+
    '<div class="r2"><div class="fi"><label>自チームスコア</label><input type="number" id="rHS" value="'+esc(r.homeScore||0)+'" min="0"></div><div class="fi"><label>相手スコア</label><input type="number" id="rAS" value="'+esc(r.awayScore||0)+'" min="0"></div></div>'+
    '<div class="fi"><label>種別</label><select id="rTp"><option value="league"'+(r.type==='league'?' selected':'')+'>リーグ</option><option value="tournament"'+(r.type==='tournament'?' selected':'')+'>大会</option><option value="practice"'+(r.type==='practice'?' selected':'')+'>練習試合</option></select></div>'+
    '<div class="fi"><label>大会名</label><input type="text" id="rTn" value="'+esc(r.tournamentName||'')+'" placeholder="例: ふれあい大会"></div>'+
    '<div class="br"><button class="btn bto btf" onclick="closeSheetDirect()">キャンセル</button><button class="btn btp btf" onclick="saveR()">保存する</button></div>'
  );
}
function saveR(){
  var o={id:editingId||nid(DB.results),date:document.getElementById('rD').value,home:document.getElementById('rH').value,homeScore:parseInt(document.getElementById('rHS').value)||0,away:document.getElementById('rA').value,awayScore:parseInt(document.getElementById('rAS').value)||0,type:document.getElementById('rTp').value,tournamentName:document.getElementById('rTn').value};
  if(editingId)DB.results=DB.results.map(function(x){return x.id===editingId?o:x;});else DB.results.push(o);
  stSave();closeSheetDirect();renderAll();
}
function delR(id){DB.results=DB.results.filter(function(x){return x.id!==id;});stSave();renderAll();}
</script>
</body>
</html>
